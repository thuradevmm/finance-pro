name: Migration Safety

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  migration-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Supabase migrations
        run: npm run db:migration:check

      - name: Lint
        run: npm run lint
